name: Validate Release Metadata

on:
  release:
    types: [released]

jobs:
  validate-release-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Extract release body
        run: |
          set -euo pipefail
          jq -r '.release.body // ""' "$GITHUB_EVENT_PATH" > .release-body.txt

      - name: Validate tag, versions, changelog, and release notes
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          bash scripts/validate-release-metadata.sh \
            --tag-version "$RELEASE_TAG" \
            --release-body-file .release-body.txt

      - name: Note release process
        run: |
          echo "Release metadata is validated from the committed tag contents."
          echo "Use scripts/create-release.sh to finalize CHANGELOG.md before publishing."
